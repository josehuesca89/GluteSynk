name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    # THIS IS THE NEW PART:
    defaults:
      run:
        working-directory: GluteSynk
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install & Build
        run: |
          npm install
          npm run build
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./GluteSynk/dist" # Added the folder name here too!
      - name: Deploy
        uses: actions/deploy-pages@v4
