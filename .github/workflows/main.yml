name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install & Build
        run: |
          cd import-workout-components-data
          npm install
          npm run build
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./import-workout-components-data/dist"
      - name: Deploy
        uses: actions/deploy-pages@v4
      - name: Report Failure
        if: failure()
        run: |
          echo "Deployment failed! Check the logs for errors in App.tsx or package.json."
